<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Course outline</title>

  <!-- This page is the course outline; it is not a tracked topic. -->
  <meta name="course-slug" content="home">

  <link rel="stylesheet" href="course-style.css">
  <script src="course-config.js"></script>
  <!-- Apply the course's topic accent before paint, so there is no colour flash. -->
  <script>document.documentElement.dataset.topic = (window.COURSE_CONFIG || {}).topic || "foundations";</script>
  <script src="course-nav.js" defer></script>
</head>
<body>

<div class="page">
  <!-- Chrome bar (breadcrumb + prev/next) injected by course-nav.js -->
  <div id="lace-nav-container"></div>

  <main class="page-body">
    <p class="eyebrow" id="outline-eyebrow">Course</p>
    <h1 class="display outline-title" id="outline-title">Loading…</h1>
    <p class="outline-lead" id="outline-lead"></p>

    <!-- Continue card — the single, progress-aware call to action -->
    <a class="continue-card" id="continue-card" href="#">
      <span class="continue-ring">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="25.5" fill="none" stroke="rgba(255,250,240,0.18)" stroke-width="5"></circle>
          <circle id="continue-ring-arc" cx="28" cy="28" r="25.5" fill="none" stroke="#b88a2d"
                  stroke-width="5" stroke-linecap="round" stroke-dasharray="160.2" stroke-dashoffset="160.2"></circle>
        </svg>
        <span id="continue-ring-label">0%</span>
      </span>
      <span class="continue-meta">
        <span class="continue-kicker" id="continue-kicker">Begin</span>
        <span class="continue-topic" id="continue-topic">First topic</span>
        <span class="continue-sub" id="continue-sub"></span>
      </span>
      <span class="continue-go" id="continue-go">Continue</span>
    </a>

    <!-- Course outline -->
    <section class="outline-section">
      <div class="outline-section-head">
        <h2>Course outline</h2>
        <span class="eyebrow eyebrow-muted" id="outline-count"></span>
      </div>
      <div class="outline-list" id="outline-list"></div>
    </section>

    <div class="footer-microcopy">
      Visiting a topic marks it complete automatically · Hosted on Brightspace
      <br>
      <button type="button" onclick="resetLaceProgress()">↻ Reset course progress</button>
    </div>
  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var config = window.COURSE_CONFIG;
  if (!config) return;
  document.title = config.courseTitle;

  // ── Progress ──
  var storageKey = "lace_progress_" + config.courseId;
  var progress = { completed: [] };
  try {
    var stored = localStorage.getItem(storageKey);
    if (stored) progress = JSON.parse(stored);
  } catch (e) {}
  var completedSet = {};
  (progress.completed || []).forEach(function (s) { completedSet[s] = true; });

  var isLms = config.deployMode === "lms";
  function topicUrl(t) {
    if (isLms && t.url && t.url !== "#") return t.url;
    return t.file || t.url || "#";
  }

  // ── Flatten topics ──
  var flat = [];
  config.modules.forEach(function (mod) {
    mod.topics.forEach(function (t) {
      flat.push({
        slug: t.slug, title: t.title, url: topicUrl(t),
        kind: t.kind || "Topic", minutes: t.minutes || 0,
        updated: t.updated || "", description: t.description || "",
        moduleTitle: mod.title,
      });
    });
  });

  var total = flat.length;
  var done = flat.filter(function (t) { return completedSet[t.slug]; }).length;
  var pct = total ? Math.round((done / total) * 100) : 0;
  var totalMinutes = flat.reduce(function (sum, t) { return sum + t.minutes; }, 0);
  var minutesLeft = flat.filter(function (t) { return !completedSet[t.slug]; })
    .reduce(function (sum, t) { return sum + t.minutes; }, 0);

  // Status: done · active (first open) · next (second open) · later.
  var openSlugs = flat.filter(function (t) { return !completedSet[t.slug]; }).map(function (t) { return t.slug; });
  function statusOf(slug) {
    if (completedSet[slug]) return "done";
    if (slug === openSlugs[0]) return "active";
    if (slug === openSlugs[1]) return "next";
    return "later";
  }
  var STATUS_LABEL = { done: "Done", active: "In progress", next: "Next up", later: "Later" };

  // ── Header ──
  document.getElementById("outline-eyebrow").textContent =
    "Course" + (config.courseArea ? " · " + config.courseArea : "");
  document.getElementById("outline-title").textContent = config.courseTitle;
  document.getElementById("outline-lead").innerHTML = config.courseBlurb || config.courseSubtitle || "";
  document.getElementById("outline-count").textContent =
    total + " topics · " + totalMinutes + " min";

  // ── Continue card ──
  var resume = flat.find(function (t) { return !completedSet[t.slug]; });
  var card = document.getElementById("continue-card");
  var arc = document.getElementById("continue-ring-arc");
  var C = 2 * Math.PI * 25.5;
  arc.setAttribute("stroke-dasharray", C.toFixed(1));
  arc.setAttribute("stroke-dashoffset", (C - (pct / 100) * C).toFixed(1));
  document.getElementById("continue-ring-label").textContent = pct + "%";

  if (resume) {
    var resumeIndex = flat.indexOf(resume) + 1;
    var verb = done > 0 ? "Continue" : "Begin";
    document.getElementById("continue-kicker").textContent =
      verb + " · Topic " + resumeIndex + " of " + total;
    document.getElementById("continue-topic").textContent = resume.title;
    document.getElementById("continue-sub").textContent =
      done + " of " + total + " topics complete · " + minutesLeft + " min remaining";
    document.getElementById("continue-go").textContent =
      verb + (resume.minutes ? " · " + resume.minutes + " min" : "");
    card.setAttribute("href", resume.url);
  } else {
    // Completed — the ring + button shift to the steady "done" green via CSS.
    card.classList.add("is-complete");
    document.getElementById("continue-kicker").textContent = "Course complete";
    document.getElementById("continue-topic").textContent = "You've finished every topic";
    document.getElementById("continue-sub").textContent = total + " of " + total + " topics complete";
    document.getElementById("continue-go").textContent = "Review outline";
    card.setAttribute("href", config.courseHomeUrl);
  }

  // ── Outline rows ──
  var list = document.getElementById("outline-list");
  var multiModule = config.modules.length > 1;
  var html = "";
  config.modules.forEach(function (mod) {
    if (multiModule) {
      html += '<p class="outline-module-label">' + mod.title + "</p>";
    }
    mod.topics.forEach(function (t, i) {
      var idxGlobal = flat.findIndex(function (f) { return f.slug === t.slug; });
      var status = statusOf(t.slug);
      var url = topicUrl(t);
      var nodeClass = "node" + (status === "done" ? " done" : status === "active" ? " active" : "");
      var nodeInner = status === "done"
        ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4 4L19 6"/></svg>'
        : (idxGlobal + 1);
      // Change badge — coloured by *what changed*, not by topic.
      var updatedTag = "";
      if (t.updated) {
        var uu = t.updated.toLowerCase();
        var pillCls =
          uu.indexOf("law") > -1 || uu.indexOf("changed") > -1
            ? "pill-changed"
            : uu.indexOf("new") > -1
            ? "pill-new"
            : "pill-updated";
        updatedTag = '<span class="pill ' + pillCls + '">● ' + t.updated + "</span>";
      }
      html +=
        '<a class="outline-row ' + status + '" href="' + url + '">' +
          '<span class="' + nodeClass + '">' + nodeInner + "</span>" +
          "<span>" +
            '<span class="outline-row-title">' + t.title + "</span>" +
            '<span class="outline-row-meta">' +
              '<span class="kind-tag">' + (t.kind || "Topic") + "</span>" +
              '<span class="mins">' + (t.minutes || 0) + " min</span>" +
              updatedTag +
            "</span>" +
          "</span>" +
          '<span class="outline-row-status">' + STATUS_LABEL[status] + "</span>" +
          '<span class="outline-row-chevron">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>' +
          "</span>" +
        "</a>";
    });
  });
  list.innerHTML = html;
});
</script>
</body>
</html>
